<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المساعد الصوتي الذكي</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 32px;
      font-weight: 600;
    }

    /* Animated Avatar - LED Style */
    .avatar-container {
      margin: 20px 0;
      display: flex;
      justify-content: center;
    }

    .avatar {
      width: 240px;
      height: 240px;
      border-radius: 20px;
      background: #0a1f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      padding: 30px;
    }

    .avatar-face {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
      position: relative;
    }

    /* Eyes */
    .eyes {
      display: flex;
      justify-content: space-between;
      width: 100%;
      gap: 60px;
    }

    .eye {
      width: 12px;
      height: 70px;
      background: #00ff88;
      box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow: hidden;
      transition: height 0.15s ease;
    }

    .eye-segment {
      flex: 1;
      background: #00ff88;
      border-radius: 2px;
    }

    /* Blinking animation */
    .avatar.blinking .eye {
      height: 8px;
    }

    /* Mouth */
    .mouth {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      margin-top: 15px;
      transition: all 0.1s ease;
    }

    .mouth-segment {
      width: 10px;
      height: 10px;
      background: #00ff88;
      box-shadow: 0 0 5px #00ff88;
      border-radius: 2px;
      transition: all 0.1s ease;
    }

    .mouth-segment:nth-child(1),
    .mouth-segment:nth-child(13) {
      height: 10px;
    }

    .mouth-segment:nth-child(2),
    .mouth-segment:nth-child(12) {
      height: 14px;
    }

    .mouth-segment:nth-child(3),
    .mouth-segment:nth-child(11) {
      height: 18px;
    }

    .mouth-segment:nth-child(4),
    .mouth-segment:nth-child(10) {
      height: 20px;
    }

    .mouth-segment:nth-child(5),
    .mouth-segment:nth-child(9) {
      height: 22px;
    }

    .mouth-segment:nth-child(6),
    .mouth-segment:nth-child(7),
    .mouth-segment:nth-child(8) {
      height: 22px;
    }

    /* Speaking animation - mouth opens wider */
    .avatar.speaking .mouth-segment {
      animation: mouth-talk 0.15s infinite alternate;
    }

    @keyframes mouth-talk {
      0% { 
        height: 10px;
        transform: scaleY(0.8);
      }
      100% { 
        transform: scaleY(1.3);
      }
    }

    .avatar.speaking .mouth-segment:nth-child(6),
    .avatar.speaking .mouth-segment:nth-child(7),
    .avatar.speaking .mouth-segment:nth-child(8) {
      animation: mouth-center 0.15s infinite alternate;
    }

    @keyframes mouth-center {
      0% { 
        height: 22px;
      }
      100% { 
        height: 30px;
      }
    }

    .avatar.speaking {
      animation: head-tilt 0.8s infinite alternate ease-in-out;
      box-shadow: 0 10px 40px rgba(0, 255, 136, 0.4);
    }

    .avatar.speaking .eye,
    .avatar.speaking .mouth-segment {
      box-shadow: 0 0 15px #00ff88, 0 0 30px #00ff88;
    }

    @keyframes head-tilt {
      0% { transform: rotate(-2deg) translateY(0); }
      50% { transform: rotate(0deg) translateY(-5px); }
      100% { transform: rotate(2deg) translateY(0); }
    }

    .sound-waves {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 20px;
      border: 3px solid rgba(0, 255, 136, 0.3);
      opacity: 0;
    }

    .avatar.speaking .sound-waves {
      animation: wave-pulse 1.5s infinite;
    }

    @keyframes wave-pulse {
      0% { 
        transform: scale(1);
        opacity: 0.6;
      }
      100% { 
        transform: scale(1.4);
        opacity: 0;
      }
    }

    .status {
      margin: 20px 0;
      padding: 15px;
      border-radius: 10px;
      background: #f0f0f0;
      color: #666;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status.recording {
      background: #ffe6e6;
      color: #e74c3c;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 18px 40px;
      font-size: 18px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button.recording {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      animation: pulse 1.5s infinite;
    }

    #response {
      margin-top: 30px;
      font-size: 18px;
      line-height: 1.6;
      color: #2c3e50;
      padding: 20px;
      border-radius: 10px;
      background: #f8f9fa;
      min-height: 80px;
      display: none;
    }

    #response.show {
      display: block;
    }

    audio {
      margin-top: 20px;
      width: 100%;
      display: none;
    }

    audio.show {
      display: block;
    }

    .mic-icon {
      font-size: 24px;
      margin-left: 10px;
    }

    .loading {
      display: none;
      margin: 20px auto;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading.show {
      display: block;
    }

    .error {
      color: #e74c3c;
      background: #ffe6e6;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 المساعد الصوتي الذكي</h1>
    
    <!-- Animated Avatar -->
    <div class="avatar-container">
      <div class="avatar" id="avatar">
        <div class="sound-waves"></div>
        <div class="avatar-face">
          <div class="eyes">
            <div class="eye">
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
            </div>
            <div class="eye">
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
              <div class="eye-segment"></div>
            </div>
          </div>
          <div class="mouth">
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
            <div class="mouth-segment"></div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="status" id="status">اضغط على الزر للبدء</div>
    
    <button id="recordBtn">
      <span class="mic-icon">🎤</span>
      ابدأ التحدث
    </button>

    <div class="loading" id="loading"></div>
    
    <div id="response"></div>
    
    <audio id="audioPlayer" controls></audio>

    <div class="error" id="error"></div>
  </div>

  <script>
    let mediaRecorder;
    let audioChunks = [];
    const recordBtn = document.getElementById("recordBtn");
    const statusDiv = document.getElementById("status");
    const responseDiv = document.getElementById("response");
    const audioPlayer = document.getElementById("audioPlayer");
    const loadingDiv = document.getElementById("loading");
    const errorDiv = document.getElementById("error");
    const avatar = document.getElementById("avatar");

    // Random blinking animation
    function blink() {
      avatar.classList.add('blinking');
      setTimeout(() => {
        avatar.classList.remove('blinking');
      }, 150);
    }

    // Blink every 2-4 seconds randomly
    function startBlinking() {
      const randomDelay = Math.random() * 2000 + 2000; // 2-4 seconds
      setTimeout(() => {
        if (!avatar.classList.contains('speaking')) {
          blink();
        }
        startBlinking();
      }, randomDelay);
    }

    startBlinking();

    // Animate avatar when audio plays
    audioPlayer.addEventListener('play', () => {
      avatar.classList.add('speaking');
    });

    audioPlayer.addEventListener('pause', () => {
      avatar.classList.remove('speaking');
    });

    audioPlayer.addEventListener('ended', () => {
      avatar.classList.remove('speaking');
    });

    recordBtn.addEventListener("click", async () => {
      // Stop recording
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        recordBtn.classList.remove("recording");
        recordBtn.innerHTML = '<span class="mic-icon">🎤</span> ابدأ التحدث';
        statusDiv.classList.remove("recording");
        statusDiv.textContent = "جاري المعالجة...";
        loadingDiv.classList.add("show");
        return;
      }

      // Start recording
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        // Clear previous results
        responseDiv.classList.remove("show");
        audioPlayer.classList.remove("show");
        errorDiv.classList.remove("show");
        loadingDiv.classList.remove("show");

        mediaRecorder.ondataavailable = event => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const formData = new FormData();
          formData.append("audio", audioBlob, "recording.webm");

          try {
            const res = await fetch("/ask", {
              method: "POST",
              body: formData
            });

            const data = await res.json();
            loadingDiv.classList.remove("show");

            if (res.ok) {
              statusDiv.textContent = "تم بنجاح! ✅";
              statusDiv.classList.remove("recording");
              
              responseDiv.innerHTML = `<strong>الإجابة:</strong><br>${data.assistant_text}`;
              responseDiv.classList.add("show");
              
              if (data.audio_base64) {
                audioPlayer.src = data.audio_base64;
                audioPlayer.classList.add("show");
                audioPlayer.play();
              }
            } else {
              throw new Error(data.error || "خطأ غير معروف");
            }
          } catch (error) {
            console.error("Error:", error);
            loadingDiv.classList.remove("show");
            statusDiv.textContent = "حدث خطأ ❌";
            statusDiv.classList.remove("recording");
            errorDiv.textContent = "حدث خطأ: " + (error.message || "غير معروف");
            errorDiv.classList.add("show");
          }
        };

        mediaRecorder.start();
        recordBtn.classList.add("recording");
        recordBtn.innerHTML = '<span class="mic-icon">⏹️</span> أوقف التسجيل';
        statusDiv.classList.add("recording");
        statusDiv.textContent = "🎙️ جاري التسجيل...";
      } catch (error) {
        console.error("Microphone access error:", error);
        errorDiv.textContent = "فشل الوصول إلى الميكروفون. تأكد من منح الإذن.";
        errorDiv.classList.add("show");
      }
    });
  </script>
</body>
</html>
